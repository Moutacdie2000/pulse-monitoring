name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    env:
      # Valeurs factices : les tests sont purs et le build ne se connecte pas à la BDD.
      DATABASE_URL: 'file:./ci.db'
      AUTH_SECRET: 'ci-secret-ci-secret-ci-secret-32x'
      APP_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Tests unitaires (Vitest)
        run: npm test
      - name: Build Next.js
        run: npm run build
